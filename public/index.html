<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edlics</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2389b4fa'/><text x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='18' fill='%231e1e2e'>Ed</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1e1e2e; --sidebar: #1a1a2e; --border: #2d2d44;
  --text: #cdd6f4; --text-dim: #6c7086; --text-dimmer: #45475a;
  --accent: #89b4fa; --accent-hover: #74a0e8; --hover: #262640; --active: #2d2d44;
  --dir-color: #89b4fa; --file-color: #a6adc8;
  --folder-bg: rgba(137,180,250,0.08);
  --tab-bg: #1a1a2e; --tab-active-bg: #1e1e2e;
  --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af; --peach: #fab387; --mauve: #cba6f7; --pink: #f5c2e7;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
.toolbar {
  display: flex; align-items: center; gap: 6px; padding: 0 12px;
  background: var(--sidebar); border-bottom: 1px solid var(--border);
  min-height: 44px; flex-shrink: 0;
}
.toolbar .logo {
  display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px;
  color: var(--accent); margin-right: 8px; letter-spacing: -0.3px;
  padding: 4px 8px 4px 4px; border-radius: 6px; cursor: default;
}
.toolbar .logo-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; background: var(--accent); color: var(--bg);
  border-radius: 5px; font-size: 12px; font-weight: 800; letter-spacing: -0.5px;
}
.toolbar .path-bar {
  flex: 1; display: flex; align-items: center; gap: 2px;
  overflow-x: auto; white-space: nowrap; padding: 2px 8px;
  background: rgba(0,0,0,0.2); border-radius: 4px; margin: 0 4px; min-height: 28px;
}
.toolbar .path-bar span {
  color: var(--text-dim); font-size: 12px; cursor: pointer;
  padding: 1px 5px; border-radius: 3px; font-family: 'SF Mono', 'Fira Code', monospace;
}
.toolbar .path-bar span:hover { background: var(--hover); color: var(--text); }
.toolbar .path-bar .sep { color: var(--text-dimmer); cursor: default; padding: 0 1px; }
.toolbar .path-bar .sep:hover { background: transparent; }
.toolbar button {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; white-space: nowrap;
  transition: all 0.15s; display: flex; align-items: center; gap: 4px;
}
.toolbar button:hover { background: var(--hover); color: var(--text); border-color: var(--accent); }
.toolbar button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
.toolbar button.primary:hover { background: var(--accent-hover); }
.toolbar .search-box {
  background: rgba(0,0,0,0.25); border: 1px solid var(--border); color: var(--text);
  padding: 5px 10px; border-radius: 5px; font-size: 12px; width: 160px; outline: none;
  transition: border-color 0.15s;
}
.toolbar .search-box:focus { border-color: var(--accent); width: 200px; }
.toolbar .search-box::placeholder { color: var(--text-dimmer); }
.container { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 260px; min-width: 180px; background: var(--sidebar);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 8px; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-dim); flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.sidebar-header button {
  background: transparent; border: none; color: var(--text-dimmer);
  cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 15px; transition: color 0.15s;
}
.sidebar-header button:hover { color: var(--text); background: var(--hover); }
.file-tree {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.file-tree::-webkit-scrollbar { width: 6px; }
.file-tree::-webkit-scrollbar-track { background: transparent; }
.file-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.file-tree::-webkit-scrollbar-thumb:hover { background: var(--text-dimmer); }
.tree-item {
  display: flex; align-items: center; gap: 6px; padding: 5px 14px;
  cursor: pointer; font-size: 13px; color: var(--text); user-select: none;
  white-space: nowrap; transition: background 0.1s;
}
.tree-item:hover { background: var(--hover); }
.tree-item .icon {
  flex-shrink: 0; width: 18px; text-align: center; font-size: 11px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.tree-item .name { overflow: hidden; text-overflow: ellipsis; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tabs {
  display: flex; align-items: center; background: var(--tab-bg);
  border-bottom: 1px solid var(--border); overflow-x: auto;
  flex-shrink: 0; min-height: 36px;
}
.tabs::-webkit-scrollbar { height: 3px; }
.tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.tab {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  font-size: 12px; cursor: pointer; border-right: 1px solid var(--border);
  color: var(--text-dim); white-space: nowrap; user-select: none; min-width: 0;
  transition: background 0.1s, color 0.1s;
}
.tab:hover { background: var(--hover); color: var(--text); }
.tab.active {
  background: var(--tab-active-bg); color: var(--text);
  border-bottom: 2px solid var(--accent); margin-bottom: -1px;
}
.tab .close {
  font-size: 15px; line-height: 1; color: var(--text-dimmer);
  cursor: pointer; padding: 0 2px; border-radius: 2px; transition: color 0.1s;
}
.tab .close:hover { color: var(--red); }
.editor-area { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
.editor-area .welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-dim); gap: 6px;
}
.editor-area .welcome .key {
  font-size: 40px; font-weight: 800; color: var(--accent); margin-bottom: 4px;
  width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
  background: rgba(137,180,250,0.08); border-radius: 12px; border: 1px solid rgba(137,180,250,0.15);
}
.editor-area .welcome p { font-size: 14px; color: var(--text-dim); }
.editor-area .welcome .hint { font-size: 12px; color: var(--text-dimmer); }
.editor-area .welcome .hint kbd {
  background: var(--sidebar); padding: 2px 7px; border-radius: 4px;
  border: 1px solid var(--border); font-family: inherit; font-size: 11px;
}
.welcome.hidden { display: none; }
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.65); display: flex; align-items: center;
  justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
}
.overlay.hidden { display: none; }
.dialog {
  background: var(--sidebar); border: 1px solid var(--border);
  border-radius: 10px; padding: 24px; min-width: 360px; max-width: 440px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}
.dialog h3 { margin-bottom: 16px; font-size: 16px; color: var(--text); }
.dialog label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.dialog input, .dialog select {
  width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; font-size: 13px; margin-bottom: 16px; outline: none;
  transition: border-color 0.15s;
}
.dialog input:focus { border-color: var(--accent); }
.dialog .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
.dialog .btn-row button {
  padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 13px;
  border: 1px solid var(--border); transition: all 0.15s;
}
.dialog .btn-row .primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
.dialog .btn-row .primary:hover { background: var(--accent-hover); }
.dialog .btn-row .cancel { background: transparent; color: var(--text); }
.dialog .btn-row .cancel:hover { background: var(--hover); }
.statusbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3px 14px; background: var(--sidebar); border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-dimmer); flex-shrink: 0;
}
.statusbar span { display: flex; align-items: center; gap: 16px; }
.context-menu {
  position: fixed; background: var(--sidebar); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px; min-width: 160px; z-index: 2000;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.context-menu.hidden { display: none; }
.context-menu-item {
  padding: 7px 12px; font-size: 13px; cursor: pointer; border-radius: 5px;
  display: flex; align-items: center; gap: 8px; transition: background 0.1s;
}
.context-menu-item:hover { background: var(--hover); }
.context-menu-item.danger { color: var(--red); }
.toast {
  position: fixed; bottom: 40px; right: 20px; background: var(--green); color: var(--bg);
  padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
  z-index: 3000; opacity: 0; transition: opacity 0.25s; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.toast.error { background: var(--red); }
.toast.show { opacity: 1; }
.editor-area .cm-editor { height: 100%; }
.editor-area .cm-editor .cm-scroller { overflow: auto; }
.cm-editor { background: var(--bg); color: var(--text); }
.cm-editor .cm-gutters { background: var(--sidebar); color: var(--text-dimmer); border-right: 1px solid var(--border); }
.cm-editor .cm-activeLine { background: var(--hover); }
.cm-editor .cm-activeLineGutter { background: var(--active); }
.cm-editor .cm-cursor { border-left-color: var(--text); }
.cm-editor .cm-selectionBackground, .cm-editor.cm-focused .cm-selectionBackground { background: var(--active); }
.cm-editor .cm-matchingBracket { background: rgba(137,180,250,0.2); outline: 1px solid var(--accent); }
.cm-editor .cm-foldPlaceholder { background: var(--hover); color: var(--text-dim); }
</style>
</head>
<body>
<div class="toolbar">
  <span class="logo"><span class="logo-mark">Ed</span>Edlics</span>
  <span id="serverBadge" style="font-size:11px;color:var(--text-dimmer);margin-right:4px;white-space:nowrap;"></span>
  <span id="themeToggle" title="Toggle theme" style="cursor:pointer;font-size:14px;color:var(--text-dimmer);padding:2px 6px;border-radius:4px;user-select:none;transition:color 0.15s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-dimmer)'">🌙</span>
  <div class="path-bar" id="pathBar"></div>
  <input class="search-box" id="searchBox" placeholder="Search files..." />
  <button id="btnNewFile" title="New file">+ File</button>
  <button id="btnNewDir" title="New folder">+ Dir</button>
</div>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Explorer</span>
      <span style="display:flex;align-items:center;gap:6px;">
        <span id="sudoBadge" style="display:none;font-size:10px;color:var(--yellow);font-weight:600;">sudo</span>
        <button id="btnRefresh" title="Refresh">↻</button>
      </span>
    </div>
    <div class="file-tree" id="fileTree"></div>
  </div>
  <div class="main">
    <div class="tabs" id="tabs"></div>
    <div class="editor-area" id="editorArea">
      <div class="welcome" id="welcome">
        <div class="key">Ed</div>
        <p>Select a file to edit</p>
        <div class="hint">Press <kbd>Ctrl+P</kbd> to search files</div>
      </div>
    </div>
  </div>
</div>
<div class="statusbar">
  <span id="statusLeft"></span>
  <span id="statusRight"></span>
</div>
<div class="context-menu hidden" id="contextMenu"></div>
<div class="overlay hidden" id="dialogOverlay">
  <div class="dialog" id="dialogContent"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { EditorView, EditorState, basicSetup, keymap, javascript, python, html, css, json, markdown, xml, yaml } from '/editor.mjs';

const BASE = '';
const HOME = '/home/ec2-user';
let serverInfo = null;
let sudoPassword = null;
const state = {
  tabs: [], activeTab: null, dirty: new Set(), editorView: null,
};

const CM6_LANG = {
  '.js': () => javascript(), '.jsx': () => javascript({jsx:true}),
  '.ts': () => javascript({typescript:true}), '.tsx': () => javascript({jsx:true,typescript:true}),
  '.py': () => python(),
  '.html': () => html(), '.htm': () => html(),
  '.css': () => css(), '.scss': () => css(), '.less': () => css(),
  '.json': () => json(),
  '.xml': () => xml(), '.svg': () => xml(),
  '.md': () => markdown(),
  '.yml': () => yaml(), '.yaml': () => yaml(),
};

function getFileIcon(name, isDir) {
  if (isDir) return '▸';
  const ext = name.slice(name.lastIndexOf('.')).toLowerCase();
  const icons = {
    '.js': '■', '.jsx': '■', '.ts': '■', '.tsx': '■',
    '.py': '▶', '.html': '◎', '.css': '◆', '.json': '{}',
    '.md': '≡', '.sh': '>', '.yaml': '—', '.yml': '—',
    '.xml': '◎', '.svg': '◎', '.php': '◉', '.go': '◈',
    '.c': '⚙', '.cpp': '⚙', '.java': '☕', '.rb': '◆',
    '.sql': '▤', '.toml': '—', '.env': '⚙',
  };
  return icons[ext] || '·';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function basename(p) { return p.split('/').filter(Boolean).pop() || p; }
function dirname(p) { const i = p.lastIndexOf('/'); return i > 0 ? p.slice(0, i) : '/'; }
function join(...parts) { return parts.join('/').replace(/\/+/g, '/').replace(/\/$/, '') || '/'; }

function api(method, url, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  return fetch(BASE + url, opts).then(r => r.json());
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast' + (isError ? ' error' : '') + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2500);
}

// File Tree
let currentDir = HOME;

function renderTree(path) {
  currentDir = path || HOME;
  renderDir(currentDir, document.getElementById('fileTree'));
}

function dirClick(e) {
  e.stopPropagation();
  const d = e.currentTarget;
  renderDir(d.dataset.dir, d.parentNode);
}
function fileClick(e) {
  e.stopPropagation();
  const d = e.currentTarget;
  document.getElementById('statusLeft').textContent = '→ ' + d.dataset.file;
  openFile(d.dataset.file);
}
function ctxMenu(e) {
  e.preventDefault();
  const d = e.currentTarget;
  const p = d.dataset.dir || d.dataset.file;
  showContextMenu(e.clientX, e.clientY, p, !!d.dataset.dir);
}

function renderDir(dirPath, container) {
  container.innerHTML = '';
  const parent = dirPath === '/' ? null : dirname(dirPath);
  if (parent) {
    const up = document.createElement('div');
    up.className = 'tree-item';
    up.innerHTML = '<span class="icon" style="color:var(--text-dimmer)">↑</span><span class="name" style="color:var(--text-dim)">..</span>';
    up.addEventListener('click', function() { renderDir(parent, container); });
    container.appendChild(up);
  }
  api('GET', `/api/list?path=${encodeURIComponent(dirPath)}`).then(items => {
    if (!Array.isArray(items)) {
      container.innerHTML = '<div class="tree-item" style="color:var(--red);padding:8px 14px;font-size:12px;">⚠ ' + escapeHtml(items.error || 'Error') + '</div>';
      return;
    }
    for (const item of items) {
      const div = document.createElement('div');
      div.className = 'tree-item';
      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = getFileIcon(item.name, item.isDirectory);
      if (item.isDirectory) icon.style.color = 'var(--dir-color)';
      else {
        const ext = item.name.slice(item.name.lastIndexOf('.')).toLowerCase();
        const colors = { '.js':'var(--yellow)', '.ts':'var(--accent)', '.py':'var(--green)', '.html':'var(--peach)', '.css':'var(--accent)', '.json':'var(--mauve)', '.md':'var(--pink)', '.sh':'var(--green)', '.yaml':'var(--yellow)', '.yml':'var(--yellow)', '.xml':'var(--peach)', '.conf':'var(--yellow)', '.env':'var(--red)' };
        if (colors[ext]) icon.style.color = colors[ext];
      }
      div.appendChild(icon);
      const name = document.createElement('span');
      name.className = 'name';
      const isHidden = item.name.startsWith('.');
      if (isHidden) { name.style.opacity = '0.4'; name.style.fontSize = '12px'; }
      name.textContent = item.name;
      div.appendChild(name);
      if (item.isDirectory) {
        div.dataset.dir = join(dirPath, item.name);
        div.addEventListener('click', dirClick);
      } else {
        div.dataset.file = join(dirPath, item.name);
        div.addEventListener('click', fileClick);
      }
      div.addEventListener('contextmenu', ctxMenu);
      container.appendChild(div);
    }
    if (items.length === 0) {
      container.innerHTML += '<div class="tree-item" style="color:var(--text-dimmer);padding-left:24px;font-size:12px;">(empty)</div>';
    }
  }).catch(e => {
    container.innerHTML = '<div class="tree-item" style="color:var(--red);padding:8px 14px;font-size:12px;">⚠ ' + escapeHtml(e.message) + '</div>';
  });
}

// Tabs
function addTab(filePath, content, switchTo = true) {
  const existing = state.tabs.find(t => t.path === filePath);
  if (existing) {
    if (switchTo) setActiveTab(existing.id);
    return existing;
  }
  const id = Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  const tab = { id, path: filePath, name: basename(filePath), content: content || '', savedContent: content || '' };
  state.tabs.push(tab);
  renderTabs();
  if (switchTo) setActiveTab(id);
  return tab;
}

function removeTab(id) {
  const idx = state.tabs.findIndex(t => t.id === id);
  if (idx < 0) return;
  const tab = state.tabs[idx];
  if (state.dirty.has(tab.path)) {
    if (!confirm(`"${tab.name}" has unsaved changes. Close anyway?`)) return;
  }
  state.tabs.splice(idx, 1);
  state.dirty.delete(tab.path);
  if (state.activeTab === id) {
    if (state.tabs.length > 0) setActiveTab(state.tabs[Math.min(idx, state.tabs.length - 1)].id);
    else { state.activeTab = null; closeEditor(); }
  }
  if (state.tabs.length === 0) closeEditor();
  renderTabs();
}

function setActiveTab(id) {
  state.activeTab = id;
  const tab = state.tabs.find(t => t.id === id);
  if (!tab) return;
  renderTabs();
  loadEditor(tab);
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';
  for (const tab of state.tabs) {
    const div = document.createElement('div');
    div.className = 'tab' + (tab.id === state.activeTab ? ' active' : '');
    div.textContent = (state.dirty.has(tab.path) ? '● ' : '') + tab.name;
    const close = document.createElement('span');
    close.className = 'close'; close.textContent = '×';
    close.addEventListener('click', function(e) { e.stopPropagation(); removeTab(tab.id); });
    div.appendChild(close);
    div.addEventListener('click', function() { setActiveTab(tab.id); });
    div.addEventListener('contextmenu', function(e) { e.preventDefault(); showContextMenu(e.clientX, e.clientY, tab.path, false); });
    container.appendChild(div);
  }
}

function getCM6Lang(filename) {
  const ext = filename.slice(filename.lastIndexOf('.')).toLowerCase();
  const fn = CM6_LANG[ext];
  if (!fn) return [];
  try {
    const extArr = fn();
    return Array.isArray(extArr) ? extArr : [extArr];
  } catch { return []; }
}

function closeEditor() {
  if (state.editorView) {
    state.editorView.destroy();
    state.editorView = null;
  }
  const area = document.getElementById('editorArea');
  area.querySelectorAll('textarea').forEach(el => el.remove());
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.classList.remove('hidden');
  document.getElementById('pathBar').innerHTML = '';
  if (serverInfo) {
    document.getElementById('statusLeft').textContent = serverInfo.user + '@' + serverInfo.hostname;
    document.getElementById('statusRight').textContent = serverInfo.ip;
  } else {
    document.getElementById('statusLeft').textContent = '';
    document.getElementById('statusRight').textContent = '';
  }
}

function loadEditor(tab) {
  const welcome = document.getElementById('welcome');
  const area = document.getElementById('editorArea');
  if (!welcome || !area) return;
  welcome.classList.add('hidden');
  if (!tab) return;
  if (state.editorView) {
    state.editorView.destroy();
    state.editorView = null;
  }
  area.querySelectorAll('textarea').forEach(el => el.remove());
  try {
    const updateListener = EditorView.updateListener.of((update) => {
      if (update.docChanged) {
        tab.content = update.state.doc.toString();
        if (tab.content !== tab.savedContent) state.dirty.add(tab.path);
        else state.dirty.delete(tab.path);
        renderTabs();
        updateStatus();
      }
    });
    const cm6Keymap = keymap.of([
      { key: 'Mod-s', run: () => { saveFile(); return true; } }
    ]);
    const cm6Theme = EditorView.theme({
      '&': { height: '100%', fontSize: '13px' },
      '.cm-scroller': { overflow: 'auto' },
      '.cm-content': { fontFamily: '"SF Mono", "Fira Code", "Cascadia Code", monospace', tabSize: '2' },
    });
    const langExt = getCM6Lang(tab.path);
    const startState = EditorState.create({
      doc: tab.content || '',
      extensions: [
        basicSetup, updateListener, cm6Keymap, cm6Theme,
        ...langExt,
      ],
    });
    state.editorView = new EditorView({ state: startState, parent: area });
    state.editorView.focus();
    updatePathBar(tab.path);
    updateStatus();
  } catch(e) {
    area.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--red);font-size:13px;padding:20px;">⚠ ' + escapeHtml(e.message) + '</div>';
  }
}

function updatePathBar(filePath) {
  const el = document.getElementById('pathBar');
  el.innerHTML = '';
  const parts = filePath.split('/').filter(Boolean);
  let current = '';
  for (let i = 0; i < parts.length; i++) {
    if (i > 0) { const s = document.createElement('span'); s.className = 'sep'; s.textContent = '/'; el.appendChild(s); }
    current += '/' + parts[i];
    const span = document.createElement('span');
    span.textContent = parts[i];
    if (parts[i] !== basename(filePath)) {
      span.style.cursor = 'pointer';
      const dir = current;
      span.addEventListener('click', function() { renderTree(dir); });
    }
    el.appendChild(span);
  }
}

function updateStatus() {
  const tab = state.tabs.find(t => t.id === state.activeTab);
  if (!tab) { document.getElementById('statusLeft').textContent = ''; document.getElementById('statusRight').textContent = ''; return; }
  const lines = tab.content.split('\n').length;
  document.getElementById('statusLeft').textContent = tab.path;
  document.getElementById('statusRight').textContent = `${lines} lines${state.dirty.has(tab.path) ? ' ● modified' : ''}`;
}

// Sudo
let sudoRetryQueue = [];

function showSudoDialog(callback) {
  const overlay = document.getElementById('dialogOverlay');
  const content = document.getElementById('dialogContent');
  content.innerHTML = `
    <h3>Sudo Required</h3>
    <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">This file requires elevated permissions. Enter your sudo password.</p>
    <label for="sudoPasswordInput">Password</label>
    <input id="sudoPasswordInput" type="password" placeholder="sudo password" autofocus />
    <div class="btn-row">
      <button class="cancel" onclick="document.getElementById('dialogOverlay').classList.add('hidden')">Cancel</button>
      <button class="primary" id="btnSudoAuth">Authenticate</button>
    </div>`;
  overlay.classList.remove('hidden');
  document.getElementById('sudoPasswordInput').focus();
  document.getElementById('btnSudoAuth').onclick = () => {
    const pw = document.getElementById('sudoPasswordInput').value;
    if (!pw) return;
    api('POST', '/api/sudo-auth', { password: pw }).then(data => {
      if (data.error) { toast(data.error, true); return; }
      sudoPassword = pw;
      document.getElementById('sudoBadge').style.display = 'inline';
      overlay.classList.add('hidden');
      toast('Sudo authenticated');
      if (callback) callback();
    });
  };
  document.getElementById('sudoPasswordInput').onkeydown = e => {
    if (e.key === 'Enter') document.getElementById('btnSudoAuth').click();
  };
}

function handleSudoError(filePath, action) {
  api('GET', '/api/sudo-status').then(status => {
    if (status.nopasswd) {
      action();
    } else if (sudoPassword) {
      action();
    } else {
      showSudoDialog(() => action());
    }
  }).catch(() => showSudoDialog(() => action()));
}

// Theme toggle
const THEME_LIGHT = {
  '--bg': '#eff1f5', '--sidebar': '#e6e9ef', '--border': '#ccd0da',
  '--text': '#4c4f69', '--text-dim': '#7c7f93', '--text-dimmer': '#bcc0cc',
  '--accent': '#1e66f5', '--accent-hover': '#2a6ef5', '--hover': '#dce0e8', '--active': '#ccd0da',
  '--dir-color': '#1e66f5', '--file-color': '#5c5f77',
  '--tab-bg': '#e6e9ef', '--tab-active-bg': '#eff1f5',
  '--green': '#40a02b', '--red': '#d20f39', '--yellow': '#df8e1d', '--peach': '#fe640b', '--mauve': '#8839ef', '--pink': '#ea76cb',
};
function applyTheme(isLight) {
  const root = document.documentElement;
  if (isLight) {
    for (const [key, val] of Object.entries(THEME_LIGHT)) root.style.setProperty(key, val);
  } else {
    for (const key of Object.keys(THEME_LIGHT)) root.style.removeProperty(key);
  }
  document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('edlics-theme', isLight ? 'light' : 'dark');
}
const savedTheme = localStorage.getItem('edlics-theme');
if (savedTheme === 'light') applyTheme(true);
document.getElementById('themeToggle').addEventListener('click', () => {
  const isLight = !document.documentElement.style.getPropertyValue('--bg');
  applyTheme(isLight);
});

// File operations
function openFile(filePath) {
  api('GET', `/api/read?path=${encodeURIComponent(filePath)}`).then(data => {
    if (data.error === 'Permission denied') {
      return handleSudoError(filePath, () => {
        api('GET', `/api/read?path=${encodeURIComponent(filePath)}&sudo=1`).then(d2 => {
          if (d2.error) { toast(d2.error, true); return; }
          const existing = state.tabs.find(t => t.path === filePath);
          if (existing) {
            existing.content = d2.content; existing.savedContent = d2.content;
            state.dirty.delete(filePath); setActiveTab(existing.id);
          } else addTab(filePath, d2.content, true);
        });
      });
    }
    if (data.error) { toast(data.error, true); return; }
    const existing = state.tabs.find(t => t.path === filePath);
    if (existing) {
      existing.content = data.content; existing.savedContent = data.content;
      state.dirty.delete(filePath); setActiveTab(existing.id);
    } else addTab(filePath, data.content, true);
  }).catch(e => toast('Failed: ' + e.message, true));
}

function saveFile() {
  const tab = state.tabs.find(t => t.id === state.activeTab);
  if (!tab) return;
  const content = tab.content;
  function doSave(sudo) {
    const qs = sudo ? `&sudo=1` : '';
    api('PUT', `/api/write?path=${encodeURIComponent(tab.path)}${qs}`, { content }).then(data => {
      if (data.error === 'Permission denied' && !sudo) {
        return handleSudoError(tab.path, () => doSave(true));
      }
      if (data.error) { toast(data.error, true); return; }
      tab.savedContent = content; state.dirty.delete(tab.path);
      renderTabs(); toast('Saved ' + basename(tab.path));
    }).catch(e => toast('Save failed: ' + e.message, true));
  }
  doSave(false);
}

function deleteItem(filePath) {
  if (!confirm(`Delete "${basename(filePath)}"?`)) return;
  api('GET', `/api/delete?path=${encodeURIComponent(filePath)}`).then(data => {
    if (data.error) { toast(data.error, true); return; }
    const tab = state.tabs.find(t => t.path === filePath);
    if (tab) removeTab(tab.id);
    renderDir(currentDir, document.getElementById('fileTree'));
    toast('Deleted');
  }).catch(e => toast('Delete failed: ' + e.message, true));
}

function renameItem(filePath) {
  const name = basename(filePath);
  const newName = prompt('Rename to:', name);
  if (!newName || newName === name) return;
  api('POST', `/api/rename?path=${encodeURIComponent(filePath)}`, { newPath: join(dirname(filePath), newName) }).then(data => {
    if (data.error) { toast(data.error, true); return; }
    const tab = state.tabs.find(t => t.path === filePath);
    if (tab) { tab.path = join(dirname(filePath), newName); tab.name = newName; renderTabs(); }
    renderDir(currentDir, document.getElementById('fileTree'));
    toast('Renamed');
  }).catch(e => toast('Rename failed: ' + e.message, true));
}

function showNewFileDialog(type) {
  const overlay = document.getElementById('dialogOverlay');
  const content = document.getElementById('dialogContent');
  content.innerHTML = `
    <h3>New ${type === 'directory' ? 'Folder' : 'File'}</h3>
    <label>Location: ${escapeHtml(currentDir)}</label>
    <label for="newName">Name</label>
    <input id="newName" placeholder="${type === 'directory' ? 'folder-name' : 'filename.ext'}" autofocus />
    <div class="btn-row">
      <button class="cancel" onclick="document.getElementById('dialogOverlay').classList.add('hidden')">Cancel</button>
      <button class="primary" id="btnCreate">Create</button>
    </div>`;
  overlay.classList.remove('hidden');
  document.getElementById('newName').focus();
  document.getElementById('btnCreate').onclick = () => {
    const name = document.getElementById('newName').value.trim();
    if (!name) return;
    const fullPath = join(currentDir, name);
    api('POST', `/api/create?path=${encodeURIComponent(fullPath)}`, { type }).then(data => {
      if (data.error) { toast(data.error, true); return; }
      overlay.classList.add('hidden');
      renderDir(currentDir, document.getElementById('fileTree'));
      toast('Created');
      if (type !== 'directory') openFile(fullPath);
    }).catch(e => toast('Create failed: ' + e.message, true));
  };
}

// Context menu
function showContextMenu(x, y, filePath, isDir) {
  const menu = document.getElementById('contextMenu');
  const items = [
    { label: (isDir ? '▸ ' : '· ') + 'Open', action: () => { if (!isDir) openFile(filePath); } },
    { label: '↻ Rename', action: () => renameItem(filePath) },
    { label: '✕ Delete', action: () => deleteItem(filePath), danger: true },
  ];
  if (!isDir) {
    items.unshift({ label: '⎘ Copy Path', action: () => { navigator.clipboard.writeText(filePath); toast('Copied'); } });
  }
  menu.innerHTML = items.map(item =>
    `<div class="context-menu-item${item.danger ? ' danger' : ''}">${item.label}</div>`
  ).join('');
  menu.classList.remove('hidden');
  const rect = menu.getBoundingClientRect();
  menu.style.left = Math.min(x, window.innerWidth - rect.width - 10) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - rect.height - 10) + 'px';
  menu.onclick = (e) => {
    const idx = Array.from(menu.children).indexOf(e.target.closest('.context-menu-item'));
    if (idx >= 0) items[idx].action();
    menu.classList.add('hidden');
  };
}
document.addEventListener('click', e => {
  if (!e.target.closest('.context-menu')) document.getElementById('contextMenu').classList.add('hidden');
});

// Search
let searchTimeout;
document.getElementById('searchBox').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (!q) { renderTree(currentDir); return; }
  searchTimeout = setTimeout(() => {
    api('GET', `/api/search?path=${encodeURIComponent(currentDir)}&q=${encodeURIComponent(q)}`).then(results => {
      if (!Array.isArray(results) || results.length === 0) { toast('No results', true); return; }
      const tree = document.getElementById('fileTree');
      tree.innerHTML = '<div class="tree-item" style="color:var(--text-dim);padding:8px 14px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;">Search: ' + q + '</div>';
      for (const r of results.slice(0, 200)) {
        const div = document.createElement('div');
        div.className = 'tree-item';
        div.textContent = r;
        div.style.fontSize = '12px';
        div.onclick = () => { openFile(r); document.getElementById('searchBox').value = ''; renderTree(currentDir); };
        tree.appendChild(div);
      }
    });
  }, 300);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') { e.preventDefault(); document.getElementById('searchBox').focus(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); if (state.activeTab) removeTab(state.activeTab); }
  if (e.key === 'F2' && state.activeTab) { e.preventDefault(); const tab = state.tabs.find(t => t.id === state.activeTab); if (tab) renameItem(tab.path); }
  if (e.key === 'Escape') { document.getElementById('dialogOverlay').classList.add('hidden'); document.getElementById('contextMenu').classList.add('hidden'); }
});

document.getElementById('btnNewFile').onclick = () => showNewFileDialog('file');
document.getElementById('btnNewDir').onclick = () => showNewFileDialog('directory');
document.getElementById('btnRefresh').onclick = () => renderTree(currentDir);

api('GET', '/api/info').then(data => {
  if (data && data.user) {
    serverInfo = data;
    document.getElementById('serverBadge').textContent = data.user + '@' + data.hostname;
    document.getElementById('statusLeft').textContent = data.user + '@' + data.hostname;
    document.getElementById('statusRight').textContent = data.ip;
  }
}).catch(() => {});

api('GET', '/api/sudo-status').then(status => {
  if (status.nopasswd) {
    sudoPassword = true;
    document.getElementById('sudoBadge').style.display = 'inline';
    document.getElementById('sudoBadge').textContent = 'sudo';
  }
}).catch(() => {});

renderTree(HOME);
